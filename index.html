<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Онлайн плеер</title>
  
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
    }
    .kinobox_player {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>

  <div class="kinobox_player"></div>

  <!-- Подключаем скрипт Kinobox -->
  <script src="https://kinobox.tv/kinobox.min.js"></script>
  <script>
    // 1. Инициализируем Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // 2. Достаем kinopoisk_id из URL (например: site.github.io/?kp=1199773)
    const urlParams = new URLSearchParams(window.location.search);
    const kpId = urlParams.get('kp') || '1199773'; // '1199773' как фолбэк по умолчанию

    // 3. Запускаем плеер
    new Kinobox('.kinobox_player', {
      search: { kinopoisk: kpId },
      menu: {
        enable: true,
        default: 'players'
      }
    }).init();
  </script>

</body>
</html>
