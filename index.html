<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Web Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; background-color: #000; }
        body, html { width: 100%; height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .error { color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="player-container" style="width: 100%; height: 100%;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('id');

        const container = document.getElementById('player-container');

        if (tmdbId) {
            // Используем рабочий плеер по TMDB ID
            const iframeUrl = `https://kollama.one/embed/tmdb/${tmdbId}`;
            container.innerHTML = `<iframe src="${iframeUrl}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
        } else {
            container.innerHTML = `<div class="error">⚠️ Ошибка: ID фильма не передан в URL.</div>`;
        }
    </script>
</body>
</html>
