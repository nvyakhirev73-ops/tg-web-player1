<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh;">
  
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      // Открывает ссылку во внешнем браузере устройства
      window.Telegram.WebApp.openLink('https://mo.lordfilm5.pro');
      // Закрывает WebApp
      window.Telegram.WebApp.close();
    }
  </script>

</body>
</html>
